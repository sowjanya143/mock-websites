<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser Verification - {{ company_name }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #1e4d3b;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .fp-container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 400px;
            width: 100%;
        }
        .fp-header { text-align: center; margin-bottom: 30px; }
        .company-name { font-size: 24px; font-weight: bold; color: #1e4d3b; margin-bottom: 10px; }
        .fp-title { font-size: 20px; color: #1e4d3b; margin-bottom: 5px; }
        .fp-subtitle { font-size: 14px; color: #999; }
        .fp-content { display: flex; flex-direction: column; gap: 20px; }
        .loading-indicator { text-align: center; padding: 20px; }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1e4d3b;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .status-text { font-size: 14px; color: #666; }
        .error-message { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; padding: 12px; border-radius: 4px; font-size: 14px; display: none; }
        .error-message.show { display: block; }
        .retry-btn { padding: 12px 24px; font-size: 16px; font-weight: 600; background: #1e4d3b; color: white; border: none; border-radius: 4px; cursor: pointer; display: none; }
        .retry-btn.show { display: block; }
        .retry-btn:hover { background: #153028; }
        .help-text { font-size: 12px; color: #999; text-align: center; }
    </style>
</head>
<body>
    <div class="fp-container">
        <div class="fp-header">
            <div class="company-name">{{ company_name }}</div>
            <div class="fp-title">Browser Verification</div>
            <div class="fp-subtitle">Confirming your browser compatibility</div>
        </div>
        <div class="fp-content">
            <div class="loading-indicator">
                <div class="spinner"></div>
                <div class="status-text" id="status">Verifying browser...</div>
            </div>
            <div class="error-message" id="errorMsg">
                Browser verification failed. Your browser may not be compatible. Please use a standard web browser.
            </div>
            <button class="retry-btn" id="retryBtn" onclick="location.reload()">Try Again</button>
            <div class="help-text">
                This is a standard security check. It should complete within a few seconds.
            </div>
        </div>
    </div>
    <script>
        async function verifyFingerprint() {
            try {
                const canvas = document.createElement('canvas');
                canvas.width = 280;
                canvas.height = 60;
                const ctx = canvas.getContext('2d');
                ctx.textBaseline = 'top';
                ctx.font = '14px Arial';
                ctx.textBaseline = 'alphabetic';
                ctx.fillStyle = '#f60';
                ctx.fillRect(125, 1, 62, 20);
                ctx.fillStyle = '#069';
                ctx.fillText('Browser Verify', 2, 15);
                const hash = canvas.toDataURL().substring(0, 100);
                const response = await fetch('/verify-fingerprint', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ hash: hash })
                });
                if (response.ok) {
                    document.getElementById('status').textContent = 'Verification successful!';
                    setTimeout(() => location.reload(), 1000);
                } else if (response.status === 403) {
                    document.getElementById('errorMsg').classList.add('show');
                    document.getElementById('retryBtn').classList.add('show');
                    document.getElementById('status').textContent = 'Verification failed';
                    document.querySelector('.spinner').style.display = 'none';
                }
            } catch (err) {
                document.getElementById('errorMsg').classList.add('show');
                document.getElementById('retryBtn').classList.add('show');
                document.getElementById('status').textContent = 'Error during verification';
                document.querySelector('.spinner').style.display = 'none';
            }
        }
        window.addEventListener('load', verifyFingerprint);
    </script>
</body>
</html>
