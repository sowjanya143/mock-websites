<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Failed - {{ company_name }}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #1a1a1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .error-container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .error-header {
            margin-bottom: 30px;
        }

        .company-name {
            font-size: 24px;
            font-weight: bold;
            color: #1a1a1a;
            margin-bottom: 10px;
        }

        .error-title {
            font-size: 20px;
            color: #e74c3c;
            margin-bottom: 10px;
        }

        .error-message {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }

        .error-details {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #999;
        }

        .retry-btn {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            background: #c8a96e;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .retry-btn:hover {
            background: #b39860;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-header">
            <div class="company-name">{{ company_name }}</div>
            <div class="error-title">Verification Failed</div>
        </div>

        <div class="error-message">
            The CAPTCHA answer was incorrect or the challenge expired.
        </div>

        <div class="error-details">
            Please try again. If the challenge has expired, a new one will be generated automatically.
        </div>

        <a href="javascript:location.reload();" class="retry-btn">Try Again</a>
    </div>
</body>
</html>
