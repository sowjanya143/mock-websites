<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Required - {{ company_name }}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #1a1a1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .captcha-container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 400px;
            width: 100%;
        }

        .captcha-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .company-name {
            font-size: 24px;
            font-weight: bold;
            color: #1a1a1a;
            margin-bottom: 10px;
        }

        .verification-title {
            font-size: 20px;
            color: #c8a96e;
            margin-bottom: 5px;
        }

        .verification-subtitle {
            font-size: 14px;
            color: #999;
        }

        .captcha-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .captcha-image-wrapper {
            border: 2px solid #e0e0e0;
            border-radius: 4px;
            padding: 10px;
            background: #f9f9f9;
            text-align: center;
        }

        .captcha-image {
            max-width: 100%;
            height: auto;
            display: inline-block;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        input[type="text"] {
            padding: 12px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 4px;
            transition: border-color 0.3s;
            font-family: monospace;
            letter-spacing: 2px;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #c8a96e;
        }

        .timer {
            font-size: 12px;
            color: #999;
            text-align: center;
            margin: 10px 0;
        }

        .timer.warning {
            color: #e74c3c;
            font-weight: bold;
        }

        .submit-btn {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            background: #c8a96e;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .submit-btn:hover:not(:disabled) {
            background: #b39860;
        }

        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .help-text {
            font-size: 12px;
            color: #999;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="captcha-container">
        <div class="captcha-header">
            <div class="company-name">{{ company_name }}</div>
            <div class="verification-title">Verification Required</div>
            <div class="verification-subtitle">Please verify you are human</div>
        </div>

        <form method="POST" class="captcha-form">
            <div class="captcha-image-wrapper">
                <img src="data:image/png;base64,{{ captcha_image }}" alt="CAPTCHA image" class="captcha-image">
            </div>

            <div class="timer">
                Time remaining: <span id="timer">30</span>s
            </div>

            <div class="form-group">
                <label for="captcha_answer">Enter the characters shown above:</label>
                <input
                    type="text"
                    id="captcha_answer"
                    name="captcha_answer"
                    placeholder="Characters"
                    autocomplete="off"
                    required
                    autofocus
                >
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">Verify</button>

            <div class="help-text">
                This challenge expires in 30 seconds. Please solve quickly.
            </div>
        </form>
    </div>

    <script>
        let timeLeft = 30;
        const timerEl = document.getElementById('timer');
        const submitBtn = document.getElementById('submitBtn');

        setInterval(() => {
            timeLeft--;
            timerEl.textContent = timeLeft;

            if (timeLeft <= 10) {
                timerEl.parentElement.classList.add('warning');
            }

            if (timeLeft <= 0) {
                submitBtn.disabled = true;
                submitBtn.textContent = 'Challenge Expired - Refresh Page';
                timerEl.textContent = '0';
            }
        }, 1000);
    </script>
</body>
</html>
