user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=bastion:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=landmark:10m rate=4r/s;

    # Upstream definitions for all 23 sites
    upstream bastion {
        server bastion:5009;
    }

    upstream landmark {
        server landmark:5010;
    }

    upstream apex {
        server apex:5000;
    }

    upstream sentinel {
        server sentinel:5001;
    }

    upstream cipher {
        server cipher:5002;
    }

    upstream fortis {
        server fortis:5003;
    }

    # HTTP redirect to HTTPS
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # HTTPS servers for each domain

    # Bastion Investment Group
    server {
        listen 443 ssl http2;
        server_name bastion.local localhost:5009;

        ssl_certificate /etc/nginx/ssl/bastion.crt;
        ssl_certificate_key /etc/nginx/ssl/bastion.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        client_max_body_size 20M;
        limit_req zone=bastion burst=20 nodelay;

        location / {
            proxy_pass http://bastion;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
            proxy_redirect off;
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|woff|woff2|ttf|svg)$ {
            proxy_pass http://bastion;
            proxy_cache_valid 200 10d;
            proxy_cache_bypass $http_pragma $http_authorization;
            add_header Cache-Control "public, max-age=604800";
            add_header X-Cache-Status $upstream_cache_status;
        }
    }

    # Landmark Property Advisors
    server {
        listen 443 ssl http2;
        server_name landmark.local localhost:5010;

        ssl_certificate /etc/nginx/ssl/landmark.crt;
        ssl_certificate_key /etc/nginx/ssl/landmark.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        client_max_body_size 20M;
        limit_req zone=landmark burst=10 nodelay;

        location / {
            proxy_pass http://landmark;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
            proxy_redirect off;
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|woff|woff2|ttf|svg)$ {
            proxy_pass http://landmark;
            proxy_cache_valid 200 10d;
            proxy_cache_bypass $http_pragma $http_authorization;
            add_header Cache-Control "public, max-age=604800";
            add_header X-Cache-Status $upstream_cache_status;
        }
    }

    # Apex
    server {
        listen 443 ssl http2;
        server_name apex.local localhost:5000;

        ssl_certificate /etc/nginx/ssl/apex.crt;
        ssl_certificate_key /etc/nginx/ssl/apex.key;

        client_max_body_size 20M;
        limit_req zone=general burst=20 nodelay;

        location / {
            proxy_pass http://apex;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }
    }

    # Sentinel
    server {
        listen 443 ssl http2;
        server_name sentinel.local localhost:5001;

        ssl_certificate /etc/nginx/ssl/sentinel.crt;
        ssl_certificate_key /etc/nginx/ssl/sentinel.key;

        client_max_body_size 20M;
        limit_req zone=general burst=20 nodelay;

        location / {
            proxy_pass http://sentinel;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }
    }

    # Cipher
    server {
        listen 443 ssl http2;
        server_name cipher.local localhost:5002;

        ssl_certificate /etc/nginx/ssl/cipher.crt;
        ssl_certificate_key /etc/nginx/ssl/cipher.key;

        client_max_body_size 20M;
        limit_req zone=general burst=20 nodelay;

        location / {
            proxy_pass http://cipher;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }
    }

    # Fortis
    server {
        listen 443 ssl http2;
        server_name fortis.local localhost:5003;

        ssl_certificate /etc/nginx/ssl/fortis.crt;
        ssl_certificate_key /etc/nginx/ssl/fortis.key;

        client_max_body_size 20M;
        limit_req zone=general burst=20 nodelay;

        location / {
            proxy_pass http://fortis;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }
    }

    # Add more server blocks for remaining 17 sites (5004-5008 and beyond)
    # Follow the same pattern as above
}
