services:

  - type: web
    name: baep-mock-website
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt -r baep/requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 30 baep.app:app
    healthCheckPath: /
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"

  - type: web
    name: bastion-mock-website
    runtime: python
    plan: free
