services:

  - type: web
    name: baep-mock-website
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt -r baep/requirements.txt
    startCommand: gunicorn --chdir baep --bind 0.0.0.0:$PORT --workers 2 --timeout 30 app:app
    healthCheckPath: /
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"

  - type: web
    name: bastion-mock-website
    runtime: python
    plan: free
