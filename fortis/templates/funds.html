{% extends "base.html" %}

{% block content %}
<h1>Our Funds</h1>

<section class="funds-section">
    <table class="data-table">
        <thead>
            <tr>
                <th>Fund Name</th>
                <th>Strategy</th>
                <th>AUM</th>
            </tr>
        </thead>
        <tbody>
            {% if aum_data.by_fund %}
                {% for fund in aum_data.by_fund %}
                <tr>
                    <td><a href="/fund/{{ fund.id }}">{{ fund.name }}</a></td>
                    <td>{{ fund.strategy }}</td>
                    <td>${{ "{:,.0f}B".format(fund.aum / 1e9) }}</td>
                </tr>
                {% endfor %}
            {% endif %}
        </tbody>
    </table>
</section>

<style>
    h1 {
        font-size: 40px;
        margin-bottom: 30px;
        color: #333;
    }

    .funds-section {
        margin-top: 30px;
    }

    .data-table {
        width: 100%;
        border-collapse: collapse;
        background: white;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        border-radius: 8px;
        overflow: hidden;
    }

    .data-table thead {
        background: #f5f5f5;
        font-weight: bold;
    }

    .data-table th {
        padding: 15px;
        text-align: left;
        border-bottom: 2px solid #e0e0e0;
        color: #333;
    }

    .data-table td {
        padding: 15px;
        text-align: left;
        border-bottom: 1px solid #e0e0e0;
        color: #555;
    }

    .data-table tbody tr:hover {
        background: #fafafa;
    }

    .data-table tbody tr:last-child td {
        border-bottom: none;
    }

    .data-table a {
        color: #667eea;
        text-decoration: none;
        font-weight: 600;
    }

    .data-table a:hover {
        text-decoration: underline;
    }
</style>
{% endblock %}
