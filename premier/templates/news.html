{% extends "base.html" %}

{% block content %}
<h1>News & Updates</h1>

<section class="news-section">
    {% if news_data %}
        {% for article in news_data %}
        <article class="news-article">
            <div class="article-header">
                <h2>{{ article.title }}</h2>
                <p class="article-date">{{ article.date }}</p>
            </div>
            <p class="article-content">{{ article.content }}</p>
        </article>
        {% endfor %}
    {% else %}
        <p>No news articles available.</p>
    {% endif %}
</section>

<style>
    h1 {
        color: #1e3a8a;
        margin-bottom: 30px;
        font-size: 40px;
    }

    .news-section {
        display: grid;
        gap: 20px;
    }

    .news-article {
        background: white;
        padding: 25px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        border-left: 4px solid #2563eb;
        transition: box-shadow 0.3s;
    }

    .news-article:hover {
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
    }

    .article-header {
        margin-bottom: 15px;
    }

    .article-header h2 {
        color: #1e3a8a;
        margin-bottom: 8px;
        font-size: 24px;
    }

    .article-date {
        color: #2563eb;
        font-size: 14px;
        font-weight: 600;
    }

    .article-content {
        color: #333;
        line-height: 1.6;
        margin-bottom: 0;
    }
</style>
{% endblock %}
