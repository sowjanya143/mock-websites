version: '3.8'

services:
  # BASTION (Port 5009) - Fortress replica
  bastion:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - FLASK_APP=bastion/app.py
      - FLASK_ENV=production
      - PORT=5009
      - SECRET_KEY=${BASTION_SECRET_KEY:-bastion-prod-key-5009}
    ports:
      - "5009:5009"
    volumes:
      - ./bastion:/app/bastion
      - ./utils:/app/utils
      - ./shared:/app/shared
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5009/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - mock-websites

  # LANDMARK (Port 5010) - Heitman replica
  landmark:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - FLASK_APP=landmark/app.py
