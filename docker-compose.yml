      - PORT=5001
      - SECRET_KEY=${SENTINEL_SECRET_KEY:-sentinel-prod-key-5001}
    ports:
      - "5001:5001"
    volumes:
      - ./sentinel:/app/sentinel
      - ./utils:/app/utils
      - ./shared:/app/shared
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - mock-websites

  # CIPHER (Port 5002)
  cipher:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - FLASK_APP=cipher/app.py
      - FLASK_ENV=production
      - PORT=5002
      - SECRET_KEY=${CIPHER_SECRET_KEY:-cipher-prod-key-5002}
    ports:
      - "5002:5002"
    volumes:
      - ./cipher:/app/cipher
      - ./utils:/app/utils
      - ./shared:/app/shared
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - mock-websites

  # FORTIS (Port 5003)
  fortis:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - FLASK_APP=fortis/app.py
      - FLASK_ENV=production
      - PORT=5003
      - SECRET_KEY=${FORTIS_SECRET_KEY:-fortis-prod-key-5003}
    ports:
      - "5003:5003"
    volumes:
      - ./fortis:/app/fortis
      - ./utils:/app/utils
      - ./shared:/app/shared
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5003/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - mock-websites

  # Additional 17 sites (ports 5004-5008 and beyond)
  # Add more services here following the same pattern

  # NGINX Reverse Proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - bastion
      - landmark
      - apex
      - sentinel
      - cipher
      - fortis
    networks:
      - mock-websites

networks:
  mock-websites:
    driver: bridge
