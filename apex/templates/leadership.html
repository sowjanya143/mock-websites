{% extends "base.html" %}

{% block content %}
<section class="hero" style="padding: 60px 40px; text-align: center;">
    <h1 style="color: white; font-size: 48px; margin-bottom: 15px;">Leadership Team</h1>
    <p style="color: rgba(255,255,255,0.9); font-size: 18px;">World-class investment professionals with decades of combined experience</p>
</section>

<section class="team-section" style="padding: 80px 40px;">
    <div class="container">
        <div class="team-grid">
            {% for member in items %}
            <div class="team-member">
                <h3>{{ member.name }}</h3>
                <p class="title">{{ member.title }}</p>
                <p class="bio">{{ member.bio }}</p>
                <p class="background">{{ member.background }}</p>
            </div>
            {% endfor %}
        </div>
    </div>
</section>

{% endblock %}
