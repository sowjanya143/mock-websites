{% extends "base.html" %}

{% block content %}
<section class="hero" style="padding: 60px 40px; text-align: center;">
    <h1 style="color: white; font-size: 48px; margin-bottom: 15px;">News & Insights</h1>
    <p style="color: rgba(255,255,255,0.9); font-size: 18px;">Latest updates and market insights from Apex</p>
</section>

<section style="padding: 80px 40px;">
    <div class="container">
        <h2>Latest News</h2>
        <ul class="news-list">
            {% if news_data %}
                {% for item in news_data %}
                <li class="news-item">
                    <p class="news-date">{{ item.date }}</p>
                    <h3>{{ item.title }}</h3>
                    <p>{{ item.content }}</p>
                </li>
                {% endfor %}
            {% endif %}
        </ul>
    </div>
</section>
{% endblock %}
